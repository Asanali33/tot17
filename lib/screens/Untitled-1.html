<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>С Днём Рождения, Мама!</title><style>body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(-45deg,#ee7752,#e73c7e,#23a6d5,#23d5ab);background-size:400% 400%;animation:gradient 15s ease infinite;font-family:'Segoe UI',Roboto,sans-serif;overflow:hidden;color:#fff} @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}} .card{text-align:center;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:40px;border-radius:30px;box-shadow:0 8px 32px rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.3);z-index:1;max-width:80%;animation:fadeIn 2s ease-out;} h1{font-size:3rem;margin-bottom:10px;text-shadow:2px 2px 10px rgba(0,0,0,0.3)} p{font-size:1.2rem;line-height:1.6;opacity:0.9} .petal{position:absolute;background:#ffc0cb;border-radius:150% 0 150% 0;animation:animate 10s linear infinite;z-index:0;opacity:0.7} @keyframes animate{0%{top:-10%;transform:translateX(20px) rotate(0deg)}100%{top:110%;transform:translateX(-20px) rotate(360deg)}} @keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}</style></head><body><div class="card"><h1>С Днём Рождения, Мамочка! ❤️</h1><p>Ты — самое доброе, светлое и прекрасное, что есть в моей жизни.<br>Пусть каждый твой день будет полон тепла, цветов и искренних улыбок.</p></div><script>function createPetal(){const petal=document.createElement('div');petal.classList.add('petal');petal.style.left=Math.random()*window.innerWidth+'px';const size=Math.random()*15+10+'px';petal.style.width=size;petal.style.height=size;petal.style.animationDuration=Math.random()*5+5+'s';document.body.appendChild(petal);setTimeout(()=>{petal.remove()},10000)}setInterval(createPetal,200);</script></body></html>
